<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EduCatalog - Contacto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar navbar-dark shadow mb-5">
        <div class="container">
            <a class="navbar-brand fw-bold" href="servicios.html">🎓 EduCatalog</a>
            <a href="servicios.html" class="text-white text-decoration-none">Inicio</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 card p-4 shadow">
                <h3 class="text-center mb-4">Escríbenos</h3>
                <form onsubmit="return validarContacto()">
                    <div class="mb-3">
                        <label class="form-label">Tu Nombre</label>
                        <input type="text" id="nombre" class="form-control" placeholder="Ej: Lisdey Ramírez">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Correo Electrónico</label>
                        <input type="text" id="correo" class="form-control" placeholder="ejemplo@correo.com">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Enviar Mensaje</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
